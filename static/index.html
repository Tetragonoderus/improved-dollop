<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monika</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #f9eef5;
            font-family: 'Georgia', serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding: 20px;
        }

        /* Sprite area */
        #sprite-container {
            position: fixed;
            bottom: 180px;
            left: 50%;
            transform: translateX(-50%);
            height: 60vh;
            pointer-events: none;
        }

        #sprite {
            height: 100%;
            object-fit: contain;
        }

        /* Dialogue box */
        #dialogue-box {
            width: 100%;
            max-width: 860px;
            background: rgba(255, 255, 255, 0.92);
            border: 2px solid #e8b4d0;
            border-radius: 8px;
            padding: 20px 24px;
            margin-bottom: 12px;
            min-height: 90px;
            font-size: 1.05rem;
            line-height: 1.7;
            color: #3a2a3a;
            position: relative;
            z-index: 10;
        }

        #speaker-name {
            font-weight: bold;
            color: #c06090;
            margin-bottom: 6px;
            font-size: 0.95rem;
            letter-spacing: 0.05em;
        }

        #response-text {
            min-height: 1.7rem;
        }

        /* Input area */
        #input-area {
            width: 100%;
            max-width: 860px;
            display: flex;
            gap: 10px;
            position: relative;
            z-index: 10;
        }

        #message-input {
            flex: 1;
            padding: 10px 16px;
            border: 2px solid #e8b4d0;
            border-radius: 6px;
            font-family: inherit;
            font-size: 1rem;
            background: white;
            color: #3a2a3a;
            resize: none;
            min-height: 44px;
            max-height: 200px;
            overflow-y: auto;
        }

        #message-input:focus {
            outline: none;
            border-color: #c06090;
        }

        #send-button {
            padding: 10px 22px;
            background: #e8b4d0;
            border: none;
            border-radius: 6px;
            font-family: inherit;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            transition: background 0.2s;
            align-self: flex-end;
        }

        #send-button:hover { background: #c06090; }
        #send-button:disabled { background: #ddd; cursor: default; }

        /* Typing indicator */
        #typing-indicator {
            color: #c06090;
            font-style: italic;
            font-size: 0.9rem;
            height: 1.2rem;
            margin-bottom: 4px;
        }

        /* Config toggle button */
        #config-toggle {
            position: fixed;
            top: 16px;
            right: 16px;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid #e8b4d0;
            border-radius: 6px;
            width: 40px;
            height: 40px;
            font-size: 1.2rem;
            cursor: pointer;
            z-index: 100;
            transition: background 0.2s;
            line-height: 1;
        }
        #config-toggle:hover { background: #e8b4d0; }

        /* Modal overlay */
        #config-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }
        #config-overlay.open { display: flex; }

        /* Modal box */
        #config-modal {
            background: #fff;
            border: 2px solid #e8b4d0;
            border-radius: 10px;
            padding: 28px 32px;
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            color: #3a2a3a;
        }
        #config-modal h2 {
            font-size: 1.2rem;
            color: #c06090;
            margin-bottom: 2px;
        }
        #config-modal label {
            font-size: 0.9rem;
            font-weight: bold;
            display: block;
            margin-bottom: 4px;
        }
        .config-field { display: flex; flex-direction: column; }
        .api-key-row { display: flex; gap: 8px; }
        .api-key-row input { flex: 1; }
        #config-modal input[type="text"],
        #config-modal input[type="password"] {
            padding: 8px 12px;
            border: 2px solid #e8b4d0;
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.95rem;
            color: #3a2a3a;
            background: #fff;
        }
        #config-modal input:focus {
            outline: none;
            border-color: #c06090;
        }
        .config-hint {
            font-size: 0.8rem;
            color: #999;
            margin-top: 4px;
        }
        #config-modal .btn-secondary {
            padding: 7px 14px;
            background: #f9eef5;
            border: 2px solid #e8b4d0;
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.85rem;
            color: #c06090;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.2s;
        }
        #config-modal .btn-secondary:hover { background: #e8b4d0; color: white; }
        #config-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 4px;
        }
        #config-cancel {
            padding: 9px 20px;
            background: #f0f0f0;
            border: none;
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.95rem;
            color: #666;
            cursor: pointer;
            transition: background 0.2s;
        }
        #config-cancel:hover { background: #ddd; }
        #config-save {
            padding: 9px 20px;
            background: #e8b4d0;
            border: none;
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.95rem;
            color: white;
            cursor: pointer;
            transition: background 0.2s;
        }
        #config-save:hover { background: #c06090; }
        #config-save:disabled { background: #ddd; cursor: default; }
        #config-message {
            font-size: 0.85rem;
            min-height: 1.2rem;
            color: #c06090;
        }
        #config-message.error { color: #c04040; }
    </style>
</head>
<body>

    <button id="config-toggle" title="Settings">&#9881;</button>

    <div id="config-overlay">
        <div id="config-modal">
            <h2>Settings</h2>

            <div class="config-field">
                <label for="config-api-key">OpenRouter API Key</label>
                <div class="api-key-row">
                    <input type="password" id="config-api-key" placeholder="Enter new API key...">
                    <button type="button" class="btn-secondary" id="toggle-key-vis">Show</button>
                </div>
                <span class="config-hint" id="api-key-hint"></span>
            </div>

            <div class="config-field">
                <label for="config-model">Model</label>
                <input type="text" id="config-model" placeholder="e.g. gpt-4o-mini">
            </div>

            <div id="config-message"></div>

            <div id="config-buttons">
                <button id="config-cancel">Cancel</button>
                <button id="config-save">Save</button>
            </div>
        </div>
    </div>

    <div id="sprite-container">
        <!-- Drop a sprite image into static/sprites/ and update this src -->
        <img id="sprite" src="/render/1eua"
             onerror="this.style.display='none'" alt="Monika">
    </div>

    <div id="typing-indicator"></div>

    <div id="dialogue-box">
        <div id="speaker-name">Monika</div>
        <div id="response-text">Hey, [player]! I've been waiting for you.</div>
    </div>

    <div id="input-area">
        <textarea
            id="message-input"
            placeholder="Say something... (Shift+Enter for new line, Enter to send)"
            rows="1"
        ></textarea>
        <button id="send-button">Send</button>
    </div>

    <script>
        const input    = document.getElementById('message-input');
        const button   = document.getElementById('send-button');
        const response = document.getElementById('response-text');
        const typing   = document.getElementById('typing-indicator');

        // Auto-expand textarea
        input.addEventListener('input', () => {
            input.style.height = 'auto';
            input.style.height = input.scrollHeight + 'px';
        });

        // Enter to send, Shift+Enter for newline
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        button.addEventListener('click', sendMessage);

        async function sendMessage() {
            const message = input.value.trim();
            if (!message) return;

            input.value = '';
            input.style.height = 'auto';
            button.disabled = true;
            response.textContent = '';
            typing.textContent = 'Monika is thinking...';

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });

                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                typing.textContent = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const lines = decoder.decode(value).split('\n');
                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const data = line.slice(6);
                        if (data === '[DONE]') break;
                        try {
                            response.textContent += JSON.parse(data);
                        } catch {}
                    }
                }
            } catch (err) {
                response.textContent = 'Something went wrong. Please try again.';
                console.error(err);
            } finally {
                button.disabled = false;
                input.focus();
            }
        }

        // Store memory when the player closes the tab
        window.addEventListener('beforeunload', () => {
            navigator.sendBeacon('/end-session', '{}');
        });

        // --- Config modal ---
        const configToggle  = document.getElementById('config-toggle');
        const configOverlay = document.getElementById('config-overlay');
        const configApiKey  = document.getElementById('config-api-key');
        const configModel   = document.getElementById('config-model');
        const apiKeyHint    = document.getElementById('api-key-hint');
        const toggleKeyVis  = document.getElementById('toggle-key-vis');
        const configMsg     = document.getElementById('config-message');
        const configSave    = document.getElementById('config-save');
        const configCancel  = document.getElementById('config-cancel');

        async function openConfigModal() {
            configMsg.textContent = '';
            configMsg.className = '';
            configApiKey.value = '';
            configApiKey.type = 'password';
            toggleKeyVis.textContent = 'Show';
            try {
                const res = await fetch('/config');
                const data = await res.json();
                configModel.value = data.model || '';
                apiKeyHint.textContent = data.api_key_set
                    ? `Current key: ${data.api_key_preview}`
                    : 'No API key set.';
            } catch {
                apiKeyHint.textContent = 'Could not load current settings.';
            }
            configOverlay.classList.add('open');
        }

        function closeConfigModal() {
            configOverlay.classList.remove('open');
        }

        toggleKeyVis.addEventListener('click', () => {
            if (configApiKey.type === 'password') {
                configApiKey.type = 'text';
                toggleKeyVis.textContent = 'Hide';
            } else {
                configApiKey.type = 'password';
                toggleKeyVis.textContent = 'Show';
            }
        });

        configToggle.addEventListener('click', openConfigModal);
        configCancel.addEventListener('click', closeConfigModal);
        configOverlay.addEventListener('click', (e) => {
            if (e.target === configOverlay) closeConfigModal();
        });

        configSave.addEventListener('click', async () => {
            const apiKey = configApiKey.value.trim();
            const model  = configModel.value.trim();

            if (!apiKey && !model) {
                configMsg.textContent = 'Nothing to save.';
                configMsg.className = '';
                return;
            }

            configSave.disabled = true;
            configMsg.textContent = 'Saving...';
            configMsg.className = '';

            try {
                const res = await fetch('/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ api_key: apiKey, model })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Save failed');
                configMsg.textContent = 'Settings saved!';
                apiKeyHint.textContent = data.api_key_set
                    ? `Current key: ${data.api_key_preview}`
                    : 'No API key set.';
                configApiKey.value = '';
                setTimeout(closeConfigModal, 1200);
            } catch (err) {
                configMsg.textContent = err.message;
                configMsg.className = 'error';
            } finally {
                configSave.disabled = false;
            }
        });
    </script>
</body>
</html>
